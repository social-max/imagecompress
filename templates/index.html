<!DOCTYPE html>
<html>
<head>
    <title>Image Multi-Compressor</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 400px; }
        h1 { color: #1a73e8; margin-bottom: 10px; }
        input { margin: 20px 0; }
        button { background: #1a73e8; color: white; border: none; padding: 12px 24px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; }
        button:disabled { background: #ccc; }
        #loader { display: none; margin-top: 20px; color: #555; font-style: italic; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Compressor</h1>
        <p>Upload images to get 360p, 480p, 540p, and 720p versions in a ZIP.</p>
        <form action="/upload" method="post" enctype="multipart/form-data" onsubmit="start()">
            <input type="file" name="files" multiple accept="image/*" required><br>
            <button type="submit" id="btn">Process & Download</button>
        </form>
        <div id="loader">Processing images... please wait...</div>
    </div>
    <script>
        function start() {
            document.getElementById('btn').disabled = true;
            document.getElementById('loader').style.display = 'block';
        }
    </script>
</body>
</html>
